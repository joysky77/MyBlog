
<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body class="layout-{{ page.layout | default: 'page' }}">
    <header class="site-header">
      <div class="wrap">
        <nav class="site-nav" aria-label="主导航">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <div class="site-links">
            <a href="{{ '/' | relative_url }}">首页</a>
            <a href="{{ '/subscribe/' | relative_url }}">订阅</a>
            <a href="https://github.com/joysky77/MyBlog">GitHub</a>
          </div>
        </nav>
        {% unless page.layout == "post" %}
          <div class="hero">
            <p class="eyebrow">Personal Notes</p>
            <h1>{{ page.title | default: site.title }}</h1>
            <p>{{ site.description }}</p>
          </div>
        {% endunless %}
      </div>
    </header>

    <main class="wrap content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <span>{{ site.title }} · Powered by GitHub Pages and Jekyll.</span>
      </div>
    </footer>
  </body>
</html>
