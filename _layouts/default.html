
<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <script src="{{ '/assets/js/device-adapter.js' | relative_url }}"></script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/compact.css' | relative_url }}">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  </head>
  <body class="layout-{{ page.layout | default: 'page' }}">
    <header class="site-header">
      <div class="wrap">
        <nav class="site-nav" aria-label="主导航">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <div class="site-links">
            <a href="{{ '/' | relative_url }}">首页</a>
            <a href="{{ '/categories/' | relative_url }}">分类</a>
            <a href="{{ '/tags/' | relative_url }}">标签</a>
            <a href="{{ '/subscribe/' | relative_url }}">订阅</a>
            <a href="https://github.com/joysky77/MyBlog">GitHub</a>
          </div>
        </nav>
        {% unless page.layout == "post" %}
          <div class="hero">
            <div class="hero-copy">
              <h1>{{ page.title | default: site.title }}</h1>
              <p>{{ site.description }}</p>
              <div class="hero-actions">
                <a class="button-link" href="{{ '/' | relative_url }}#latest">查看文章</a>
                <a class="button-link button-link-ghost" href="{{ '/subscribe/' | relative_url }}">RSS 订阅</a>
              </div>
            </div>
            <aside class="hero-console blog-directory" aria-label="博客目录">
              <div class="console-bar">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div class="console-body">
                <p class="directory-title"><span class="token">目录</span> {{ site.posts.size }} 篇文章</p>
                <nav class="directory-links" aria-label="博客目录链接">
                  <a href="{{ '/' | relative_url }}#latest">最新文章</a>
                  <a href="{{ '/categories/' | relative_url }}">分类目录</a>
                  <a href="{{ '/tags/' | relative_url }}">标签索引</a>
                </nav>
              </div>
            </aside>
          </div>
        {% endunless %}
      </div>
    </header>

    <main class="wrap content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <span>{{ site.title }} · Powered by GitHub Pages and Jekyll.</span>
      </div>
    </footer>
  </body>
</html>
